# ============================================================
# RemoteShield X — Nginx Reverse Proxy Configuration
# ============================================================

# ─── Rate limiting zones ─────────────────────────────────────
limit_req_zone  $binary_remote_addr  zone=api:10m   rate=30r/m;
limit_req_zone  $binary_remote_addr  zone=login:10m rate=5r/m;
limit_conn_zone $binary_remote_addr  zone=addr:10m;

# ─── Upstream backend ────────────────────────────────────────
upstream backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ─── Redirect HTTP → HTTPS ───────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN_OR_IP;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Main HTTPS Server ───────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN_OR_IP;

    # ─── SSL Certificates (replace with Certbot paths) ───────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/YOUR_DOMAIN/chain.pem;

    # ─── SSL Hardening ───────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    # ─── Security Headers ─────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss:; frame-ancestors 'none';" always;

    # ─── VPN-Only Access Enforcement ─────────────────────────
    # Only allow requests from WireGuard VPN subnet (10.8.0.0/24)
    # and loopback. All else is dropped.
    allow 10.8.0.0/24;
    allow 127.0.0.1;
    allow ::1;
    deny all;

    # ─── Connection limits ────────────────────────────────────
    limit_conn addr 20;
    client_max_body_size 10m;
    client_body_timeout 15s;
    client_header_timeout 15s;
    keepalive_timeout 75s;
    send_timeout 15s;

    # ─── Hide server info ─────────────────────────────────────
    server_tokens off;
    more_clear_headers Server;

    # ─── Health check (public) ───────────────────────────────
    location = /health {
        allow all;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        access_log off;
    }

    # ─── API Routes ──────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ─── Login rate limiting (stricter) ──────────────────────
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── WebSocket (Socket.io) ───────────────────────────────
    location /socket.io/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # ─── Admin Dashboard (static files) ──────────────────────
    location /admin/ {
        alias /var/www/remoteshield/admin-dashboard/;
        try_files $uri $uri/ /admin/index.html;
        index index.html;

        # Extra security for admin area
        add_header Cache-Control "no-store, no-cache";
        add_header Pragma "no-cache";
    }

    # ─── Block sensitive paths ────────────────────────────────
    location ~ /\.(git|env|htaccess|htpasswd) {
        deny all;
        return 404;
    }

    location ~ \.(sh|conf|key|pem)$ {
        deny all;
        return 404;
    }

    # ─── Logging ─────────────────────────────────────────────
    access_log /var/log/nginx/remoteshield_access.log combined buffer=32k;
    error_log  /var/log/nginx/remoteshield_error.log warn;
}
