name: remoteshield_x
description: RemoteShield X — Enterprise Secure Remote Work Browser (Android)
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

  # WebView — 4.8.0+ required for Android 14 (API 34) WebView changes
  webview_flutter: ^4.8.0
  webview_flutter_android: ^3.16.0

  # Networking / HTTP
  http: ^1.1.0

  # Security
  # flutter_secure_storage 9.2.2 — Android 14 EncryptedSharedPreferences fix
  crypto: ^3.0.3
  flutter_secure_storage: ^9.2.2
  # local_auth 2.3.0 — fixes BiometricPrompt API changes in Android 14
  local_auth: ^2.3.0

  # State / Utils
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  uuid: ^4.2.1
  # intl 0.19.x is compatible with Flutter 3.24+
  intl: ^0.19.0

  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
