name: remoteshield_x
description: RemoteShield X — Enterprise Secure Remote Work Browser (Android)
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # WebView
  webview_flutter: ^4.4.2
  webview_flutter_android: ^3.12.1

  # Networking / HTTP
  http: ^1.1.0

  # Security & Detection
  flutter_jailbreak_detection: ^1.9.0
  crypto: ^3.0.3
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.7

  # State / Utils
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  uuid: ^4.2.1
  intl: ^0.18.1

  # UI
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
