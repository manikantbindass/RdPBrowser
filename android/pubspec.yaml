name: remoteshield_x
description: RemoteShield X — Enterprise Secure Remote Work Browser (Android)
version: 2.0.0+2
publish_to: none

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

  # WebView — 4.8.0+ required for Android 14 (API 34) WebView changes
  webview_flutter: ^4.8.0
  webview_flutter_android: ^3.16.0

  # Networking / HTTP
  http: ^1.1.0

  # Security
  # flutter_secure_storage 9.2.2 — Android 14 EncryptedSharedPreferences fix
  crypto: ^3.0.3
  flutter_secure_storage: ^9.2.2
  # local_auth 2.3.0 — fixes BiometricPrompt API changes in Android 14
  local_auth: ^2.3.0

  # State / Utils
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  uuid: ^4.2.1
  # intl 0.19.x is compatible with Flutter 3.24+
  intl: ^0.19.0

  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6

  # Browser features — tabs, bookmarks, history, downloads
  path_provider: ^2.1.2
  share_plus: ^7.2.2
  url_launcher: ^6.2.6
  permission_handler: ^11.3.1
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3
  cached_network_image: ^3.3.1
  flutter_colorpicker: ^1.1.0
  font_awesome_flutter: ^10.7.0
  html: ^0.15.4
  flutter_inappwebview: ^6.0.0
  open_file: ^3.3.2
  archive: ^3.6.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/
    - assets/search_engines/
