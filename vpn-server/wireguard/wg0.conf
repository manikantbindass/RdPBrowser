# ============================================================
# RemoteShield X — WireGuard Server Config Template
# This file is auto-generated by setup.sh on your VPS.
# DO NOT commit actual keys — this is a template only.
# ============================================================

[Interface]
# Server WireGuard private key (generated on VPS)
PrivateKey = <SERVER_PRIVATE_KEY>
# VPN tunnel IP for the server
Address = 10.8.0.1/24
# WireGuard listening port (open UDP 51820 in firewall)
ListenPort = 51820
# DNS servers pushed to clients
DNS = 1.1.1.1, 1.0.0.1

# ─── Kill-Switch Rules ──────────────────────────────────────
# Forward VPN traffic to internet
PostUp   = iptables -A FORWARD -i %i -j ACCEPT
PostUp   = iptables -A FORWARD -o %i -j ACCEPT
PostUp   = iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
# Allow WireGuard, HTTPS, HTTP, SSH inbound on public interface
PostUp   = iptables -A INPUT -i eth0 -p udp --dport 51820 -j ACCEPT
PostUp   = iptables -A INPUT -i eth0 -p tcp --dport 443 -j ACCEPT
PostUp   = iptables -A INPUT -i eth0 -p tcp --dport 80 -j ACCEPT
PostUp   = iptables -A INPUT -i eth0 -p tcp --dport 22 -j ACCEPT
PostUp   = iptables -A INPUT -i eth0 -p tcp --dport 3000 -j ACCEPT

# Teardown rules
PostDown = iptables -D FORWARD -i %i -j ACCEPT
PostDown = iptables -D FORWARD -o %i -j ACCEPT
PostDown = iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

# ─── Windows Client ─────────────────────────────────────────
[Peer]
PublicKey = <WINDOWS_CLIENT_PUBLIC_KEY>
AllowedIPs = 10.8.0.2/32
PersistentKeepalive = 25

# ─── Linux Client ───────────────────────────────────────────
[Peer]
PublicKey = <LINUX_CLIENT_PUBLIC_KEY>
AllowedIPs = 10.8.0.3/32
PersistentKeepalive = 25

# ─── macOS Client ───────────────────────────────────────────
[Peer]
PublicKey = <MACOS_CLIENT_PUBLIC_KEY>
AllowedIPs = 10.8.0.4/32
PersistentKeepalive = 25

# ─── Android Client ─────────────────────────────────────────
[Peer]
PublicKey = <ANDROID_CLIENT_PUBLIC_KEY>
AllowedIPs = 10.8.0.5/32
PersistentKeepalive = 25
