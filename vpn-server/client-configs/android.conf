# RemoteShield X — Android WireGuard Client Config
# Usage:
#   Install WireGuard from Google Play Store
#   Tap (+) → Import from file OR scan QR code
#   Generate QR: qrencode -t ansiutf8 < android.conf

[Interface]
Address = 10.8.0.5/24
PrivateKey = <ANDROID_CLIENT_PRIVATE_KEY>
DNS = 1.1.1.1, 1.0.0.1

[Peer]
PublicKey = <SERVER_PUBLIC_KEY>
Endpoint = YOUR_SERVER_STATIC_IP:51820
AllowedIPs = 0.0.0.0/0, ::/0
PersistentKeepalive = 25
