# RemoteShield X — macOS WireGuard Client Config
# Usage:
#   brew install wireguard-tools
#   OR install WireGuard from the Mac App Store
#   Import this config file into the WireGuard app

[Interface]
Address = 10.8.0.4/24
PrivateKey = <MACOS_CLIENT_PRIVATE_KEY>
DNS = 1.1.1.1, 1.0.0.1

[Peer]
PublicKey = <SERVER_PUBLIC_KEY>
Endpoint = YOUR_SERVER_STATIC_IP:51820
# Route ALL traffic (IPv4 + IPv6) through VPN
AllowedIPs = 0.0.0.0/0, ::/0
PersistentKeepalive = 25
