# RemoteShield X — Windows WireGuard Client Config
# Import this file into WireGuard for Windows app
# Download: https://www.wireguard.com/install/

[Interface]
# Your Windows device VPN tunnel IP
Address = 10.8.0.2/24
# Private key (generated by setup.sh on server)
PrivateKey = <WINDOWS_CLIENT_PRIVATE_KEY>
# Force all DNS through the VPN
DNS = 1.1.1.1, 1.0.0.1

[Peer]
# Server public key
PublicKey = <SERVER_PUBLIC_KEY>
# Your VPS static IP and WireGuard port
Endpoint = YOUR_SERVER_STATIC_IP:51820
# Route ALL traffic through VPN (kill-switch)
AllowedIPs = 0.0.0.0/0, ::/0
PersistentKeepalive = 25
