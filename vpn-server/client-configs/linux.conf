# RemoteShield X — Linux WireGuard Client Config
# Usage:
#   sudo apt install wireguard
#   sudo cp linux.conf /etc/wireguard/wg0.conf
#   sudo wg-quick up wg0
#   # To connect on boot:
#   sudo systemctl enable wg-quick@wg0

[Interface]
Address = 10.8.0.3/24
PrivateKey = <LINUX_CLIENT_PRIVATE_KEY>
DNS = 1.1.1.1, 1.0.0.1
# Kill-switch: block all traffic if VPN drops
PostUp   = iptables -A OUTPUT ! -o %i -m mark ! --mark $(wg show %i fwmark) -m addrtype ! --dst-type LOCAL -j REJECT
PostDown = iptables -D OUTPUT ! -o %i -m mark ! --mark $(wg show %i fwmark) -m addrtype ! --dst-type LOCAL -j REJECT

[Peer]
PublicKey = <SERVER_PUBLIC_KEY>
Endpoint = YOUR_SERVER_STATIC_IP:51820
AllowedIPs = 0.0.0.0/0, ::/0
PersistentKeepalive = 25
