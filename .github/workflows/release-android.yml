name: Android Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v2.0.0)'
        required: true
        default: 'v2.0.0'
      release_notes:
        description: 'Release notes'
        required: false
        default: 'Bug fixes and performance improvements.'
      prerelease:
        description: 'Mark as pre-release (true/false)?'
        required: false
        default: 'false'

permissions:
  contents: write
  packages: write
  actions: read

env:
  FLUTTER_VERSION: '3.24.5'
  JAVA_VERSION: '17'
  WORKING_DIR: android

jobs:
  build-android:
    name: Build Signed Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    outputs:
      version: ${{ steps.version.outputs.version }}
      apk_universal: ${{ steps.find_apks.outputs.apk_universal }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version resolved: ${VERSION}"

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter version info
        run: |
          flutter --version
          dart --version

      - name: Flutter pub get
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter pub get

      - name: Dart analyze
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter analyze --no-fatal-infos
        continue-on-error: false

      - name: Run unit tests
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter test --coverage
        continue-on-error: true

      - name: Decode keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            mkdir -p android/android/keystore
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/android/keystore/remoteshieldx-release.jks
            echo "Keystore decoded successfully"
          else
            echo "WARNING: KEYSTORE_BASE64 secret not set. Build will use debug signing."
          fi

      - name: Write key.properties
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            cat > android/android/key.properties << EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../keystore/remoteshieldx-release.jks
          EOF
            echo "key.properties written"
          else
            echo "Skipping key.properties (no keystore secret)"
          fi

      - name: Make gradlew executable
        working-directory: ${{ env.WORKING_DIR }}/android
        run: chmod +x gradlew

      - name: Build release APKs (split per ABI)
        working-directory: ${{ env.WORKING_DIR }}
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEYSTORE_PATH: ../keystore/remoteshieldx-release.jks
        run: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --split-per-abi \
            --dart-define=FLUTTER_ENV=production

      - name: Build universal APK
        working-directory: ${{ env.WORKING_DIR }}
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEYSTORE_PATH: ../keystore/remoteshieldx-release.jks
        run: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/debug-info-universal \
            --dart-define=FLUTTER_ENV=production

      - name: List APK artifacts
        id: find_apks
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "=== APK output directory ==="
          find build/app/outputs/apk -name '*.apk' -type f
          UNIVERSAL=$(find build/app/outputs/apk/release -name 'app-release.apk' | head -1)
          echo "apk_universal=${UNIVERSAL}" >> $GITHUB_OUTPUT

      - name: Rename APKs
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APK_DIR="build/app/outputs/apk/release"
          mkdir -p release-artifacts

          if [ -f "${APK_DIR}/app-release.apk" ]; then
            cp "${APK_DIR}/app-release.apk" \
               "release-artifacts/RemoteShieldX-${VERSION}-universal.apk"
          fi

          if [ -f "${APK_DIR}/app-arm64-v8a-release.apk" ]; then
            cp "${APK_DIR}/app-arm64-v8a-release.apk" \
               "release-artifacts/RemoteShieldX-${VERSION}-arm64-v8a.apk"
          fi

          if [ -f "${APK_DIR}/app-x86_64-release.apk" ]; then
            cp "${APK_DIR}/app-x86_64-release.apk" \
               "release-artifacts/RemoteShieldX-${VERSION}-x86_64.apk"
          fi

          echo "=== Release artifacts ==="
          ls -lah release-artifacts/

      - name: Generate checksums
        working-directory: ${{ env.WORKING_DIR }}/release-artifacts
        run: |
          sha256sum *.apk > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apks-${{ steps.version.outputs.version }}
          path: ${{ env.WORKING_DIR }}/release-artifacts/
          retention-days: 30
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: build-android
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-release-apks-${{ needs.build-android.outputs.version }}
          path: release-artifacts

      - name: List release artifacts
        run: ls -lah release-artifacts/

      - name: Set release notes
        id: release_notes
        run: |
          VERSION="${{ needs.build-android.outputs.version }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ -n "${{ github.event.inputs.release_notes }}" ]; then
            NOTES="${{ github.event.inputs.release_notes }}"
          else
            NOTES="## RemoteShield X ${VERSION} - Android Release\n\n### What's New\n- Full Android 14/15/16 (API 34/35/36) support\n- ProGuard obfuscation + resource shrinking\n- ABI-split APKs (arm64-v8a, x86_64) + universal APK\n- Security hardened build\n\n### Installation\n1. Download the APK for your device\n2. Enable 'Install from unknown sources' in Settings\n3. Install and launch RemoteShield X\n\n### Requirements\n- Android 8.0+ (API 26+)\n- Optimised for Android 14+ (API 34+)"
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Set pre-release flag
        id: prerelease
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "is_prerelease=${{ github.event.inputs.prerelease }}" >> $GITHUB_OUTPUT
          else
            VERSION="${{ needs.build-android.outputs.version }}"
            if echo "$VERSION" | grep -qE '(alpha|beta|rc)'; then
              echo "is_prerelease=true" >> $GITHUB_OUTPUT
            else
              echo "is_prerelease=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-android.outputs.version }}
          name: RemoteShieldX ${{ needs.build-android.outputs.version }} - Android
          body: ${{ steps.release_notes.outputs.notes }}
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          draft: false
          make_latest: true
          files: |
            release-artifacts/RemoteShieldX-*.apk
            release-artifacts/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
