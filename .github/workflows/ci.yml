name: RemoteShield X CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  security-events: write
  packages: write
  actions: read

env:
  NODE_VERSION: '22'
  FLUTTER_VERSION: '3.19.0'

# ═══════════════════════════════════════════════════════════════════
# JOB 1 — Backend: Lint + Test
# ═══════════════════════════════════════════════════════════════════
jobs:
  backend:
    name: Backend - Lint and Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: remoteshield
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: remoteshield_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        run: npm install
        working-directory: backend

      - name: Run ESLint
        run: npm run lint
        working-directory: backend

      - name: Run unit tests
        run: npm test -- --forceExit
        working-directory: backend
        env:
          DATABASE_URL: postgresql://remoteshield:testpassword@localhost:5432/remoteshield_test
          JWT_SECRET: test_jwt_secret_ci_minimum_32_chars_long
          JWT_REFRESH_SECRET: test_refresh_secret_ci_minimum_32chars
          SERVER_VPN_IP: 10.8.0.1
          VPN_SUBNET: 10.8.0.0/24
          SERVER_PUBLIC_IP: 127.0.0.1
          NODE_ENV: test
          PORT: 3001
          ANOMALY_DETECTION_ENABLED: 'false'

# ═══════════════════════════════════════════════════════════════════
# JOB 2 — Desktop: Windows (produces .msi + .exe)
# ═══════════════════════════════════════════════════════════════════
  desktop-windows:
    name: Desktop - Windows Build
    needs: backend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      - name: Install frontend deps
        run: npm install
        working-directory: desktop

      - name: Build Tauri app (Windows)
        run: npm run tauri build
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD || '' }}

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: RemoteShield-Windows-x64
          path: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

# ═══════════════════════════════════════════════════════════════════
# JOB 3 — Desktop: Linux (produces .deb + .AppImage)
# ═══════════════════════════════════════════════════════════════════
  desktop-linux:
    name: Desktop - Linux Build
    needs: backend
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      - name: Install frontend deps
        run: npm install
        working-directory: desktop

      - name: Build Tauri app (Linux)
        run: npm run tauri build
        working-directory: desktop

      - name: Package tar.gz for Arch Linux
        run: |
          mkdir -p dist-arch
          cp desktop/src-tauri/target/release/bundle/appimage/*.AppImage dist-arch/ || true
          cp desktop/src-tauri/target/release/remoteshield-x dist-arch/ || true
          # Write tarball OUTSIDE dist-arch to prevent "file changed as we read it" error
          tar -czf /tmp/RemoteShield-Linux-Arch-x86_64.tar.gz -C dist-arch .
          mv /tmp/RemoteShield-Linux-Arch-x86_64.tar.gz dist-arch/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RemoteShield-Linux-x64
          path: |
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            dist-arch/RemoteShield-Linux-Arch-x86_64.tar.gz
          if-no-files-found: warn

# ═══════════════════════════════════════════════════════════════════
# JOB 4 — Desktop: macOS (produces universal .dmg for Intel + Apple Silicon)
# ═══════════════════════════════════════════════════════════════════
  desktop-macos:
    name: Desktop - macOS Build
    needs: backend
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust (universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      - name: Install frontend deps
        run: npm install
        working-directory: desktop

      - name: Build Tauri app (macOS universal)
        run: npm run tauri build -- --target universal-apple-darwin
        working-directory: desktop

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: RemoteShield-macOS-Universal
          path: desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

# ═══════════════════════════════════════════════════════════════════
# JOB 5 — Android APK (release + debug)
# ═══════════════════════════════════════════════════════════════════
  android:
    name: Android - APK Build
    needs: backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Scaffold Missing Android Native Files
        run: |
          # The android platform wrapper lost its gradle configuration in source control.
          # We securely backup our custom AndroidManifest.xml, let flutter scaffold the V2 structure, and restore the manifest.
          mkdir -p /tmp/rm_backup
          cp android/app/src/main/AndroidManifest.xml /tmp/rm_backup/AndroidManifest.xml || true
          flutter create --platforms=android .
          cp /tmp/rm_backup/AndroidManifest.xml android/app/src/main/AndroidManifest.xml || true
          
          # Force Android 14 compatibility to fix crashes on OnePlus/Samsung
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 26/' android/app/build.gradle || true
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/' android/app/build.gradle || true
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/' android/app/build.gradle || true
        working-directory: android

      - name: Get Flutter packages
        run: flutter pub get
        working-directory: android

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos
        working-directory: android
        continue-on-error: true

      - name: Build release APK
        run: |
          flutter build apk \
            --release \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --split-per-abi
        working-directory: android

      - name: Upload Android APKs
        uses: actions/upload-artifact@v4
        with:
          name: RemoteShield-Android
          path: android/build/app/outputs/flutter-apk/*.apk
          if-no-files-found: warn

# ═══════════════════════════════════════════════════════════════════
# JOB 6 — Security Scan
# ═══════════════════════════════════════════════════════════════════
  security-scan:
    name: Security - Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node audit (backend)
        run: npm audit --audit-level=critical || true
        working-directory: backend

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
        if: always()
        continue-on-error: true

# ═══════════════════════════════════════════════════════════════════
# JOB 7 — Docker: Build & Push to GHCR
# ═══════════════════════════════════════════════════════════════════
  docker:
    name: Docker - Build and Push
    needs: backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/remoteshield-backend:latest
            ghcr.io/${{ github.repository_owner }}/remoteshield-backend:${{ steps.meta.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push nginx
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.nginx
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/remoteshield-nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ═══════════════════════════════════════════════════════════════════
# JOB 8 — Publish npm package to GitHub Packages
# ═══════════════════════════════════════════════════════════════════
  publish-npm:
    name: Publish - GitHub npm Package
    needs: backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js with GitHub Packages registry
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@manikantbindass'

      - name: Install dependencies
        run: npm install
        working-directory: backend

      - name: Publish package
        run: npm publish --access public
        working-directory: backend
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

# ═══════════════════════════════════════════════════════════════════
# JOB 9 — GitHub Release: Create platform-separated release with all assets
# ═══════════════════════════════════════════════════════════════════
  release:
    name: Release - Publish to GitHub
    needs:
      - desktop-windows
      - desktop-linux
      - desktop-macos
      - android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Display structure of artifacts
        run: ls -R release-artifacts/

      - name: Create GitHub Release with all platform binaries
        uses: softprops/action-gh-release@v2
        with:
          name: "RemoteShield X ${{ github.ref_name }}"
          body: |
            ## 🛡️ RemoteShield X Browser ${{ github.ref_name }}

            Enterprise-Grade Secure Remote Work Browser — All Platforms

            ---

            ### 📥 Download for Your Platform

            | Platform | File | Notes |
            |----------|------|-------|
            | 🪟 **Windows** | `RemoteShield.X_*_x64_en-US.msi` | Windows Installer (recommended) |
            | 🪟 **Windows** | `RemoteShield.X_*_x64-setup.exe` | NSIS Installer |
            | 🐧 **Ubuntu/Debian** | `remoteshield-x_*_amd64.deb` | `sudo dpkg -i *.deb` |
            | 🐧 **Linux Arch** | `RemoteShield-Linux-Arch-x86_64.tar.gz` | Extract + run binary, or use AppImage below |
            | 🐧 **Linux Universal** | `remoteshield-x_*_amd64.AppImage` | Works on Arch, Fedora, openSUSE, etc. |
            | 🍎 **macOS** | `RemoteShield.X_*_universal.dmg` | Universal binary (M1/M2 + Intel) |
            | 🤖 **Android** | `app-arm64-v8a-release.apk` | ARM64 (most modern phones) |
            | 🤖 **Android** | `app-armeabi-v7a-release.apk` | ARMv7 (older phones) |
            | 🤖 **Android** | `app-x86_64-release.apk` | x86_64 (emulators / some tablets) |

            ---

            ### ⚙️ Requirements
            - **Windows**: Windows 10/11 x64 + WebView2 runtime (included)
            - **Ubuntu/Debian**: Run `.deb` with `sudo dpkg -i *.deb`
            - **Linux Arch**: `yay -S webkit2gtk-4.1` then extract the `.tar.gz` or run the `.AppImage`
            - **Linux (AppImage)**: `chmod +x *.AppImage && ./RemoteShield*.AppImage`
            - **macOS**: macOS 10.15 Catalina or later (Intel + Apple Silicon)
            - **Android**: Android 8.0+ (API 26+), supports Android 14/15/16/17

            ### 🔒 Security
            All traffic routes through WireGuard VPN — configure your VPS endpoint in settings after first launch.

            ### 🚀 Backend Deployment
            ```bash
            git clone https://github.com/manikantbindass/RdPBrowser.git
            cd RdPBrowser/backend
            cp .env.example .env  # fill in your VPS IP + secrets
            cd ../docker && docker-compose up -d
            ```
          files: |
            release-artifacts/RemoteShield-Windows-x64/*.msi
            release-artifacts/RemoteShield-Windows-x64/*.exe
            release-artifacts/RemoteShield-Linux-x64/*.deb
            release-artifacts/RemoteShield-Linux-x64/*.AppImage
            release-artifacts/RemoteShield-Linux-x64/*.tar.gz
            release-artifacts/RemoteShield-macOS-Universal/*.dmg
            release-artifacts/RemoteShield-Android/*.apk
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: false
          fail_on_unmatched_files: false
