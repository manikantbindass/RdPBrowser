name: RemoteShield X CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: write
  security-events: write
  packages: write
  actions: read

env:
  NODE_VERSION: '20'
  FLUTTER_VERSION: '3.19.0'

jobs:
  # ───────────────────────────────────────────────────────────────
  # Job 1: Backend Lint + Test
  # ───────────────────────────────────────────────────────────────
  backend:
    name: Backend - Lint and Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: remoteshield
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: remoteshield_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        run: npm install
        working-directory: backend

      - name: Run ESLint
        run: npm run lint
        working-directory: backend

      - name: Run unit tests
        run: npm test -- --forceExit
        working-directory: backend
        env:
          DATABASE_URL: postgresql://remoteshield:testpassword@localhost:5432/remoteshield_test
          JWT_SECRET: test_jwt_secret_ci_minimum_32_chars_long
          JWT_REFRESH_SECRET: test_refresh_secret_ci_minimum_32chars
          SERVER_VPN_IP: 10.8.0.1
          VPN_SUBNET: 10.8.0.0/24
          SERVER_PUBLIC_IP: 127.0.0.1
          NODE_ENV: test
          PORT: 3001

  # ───────────────────────────────────────────────────────────────
  # Job 2: Desktop Windows Build
  # ───────────────────────────────────────────────────────────────
  desktop-windows:
    name: Desktop - Windows Build
    needs: backend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      - name: Install frontend deps
        run: npm install
        working-directory: desktop

      - name: Build Tauri app (Windows)
        run: npm run tauri build
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD || '' }}

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: remoteshield-windows
          path: desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

  # ───────────────────────────────────────────────────────────────
  # Job 3: Desktop Linux Build
  # ───────────────────────────────────────────────────────────────
  desktop-linux:
    name: Desktop - Linux Build
    needs: backend
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      - name: Install frontend deps
        run: npm install
        working-directory: desktop

      - name: Build Tauri app (Linux)
        run: npm run tauri build
        working-directory: desktop

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: remoteshield-linux
          path: |
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  # ───────────────────────────────────────────────────────────────
  # Job 4: Desktop macOS Build
  # ───────────────────────────────────────────────────────────────
  desktop-macos:
    name: Desktop - macOS Build
    needs: backend
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust (universal)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      - name: Install frontend deps
        run: npm install
        working-directory: desktop

      - name: Build Tauri app (macOS universal binary)
        run: npm run tauri build -- --target universal-apple-darwin
        working-directory: desktop

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: remoteshield-macos
          path: desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

  # ───────────────────────────────────────────────────────────────
  # Job 5: Android APK Build
  # ───────────────────────────────────────────────────────────────
  android:
    name: Android - APK Build
    needs: backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Get Flutter packages
        run: flutter pub get
        working-directory: android

      - name: Analyze Flutter code
        run: flutter analyze --no-fatal-infos
        working-directory: android

      - name: Build release APK
        run: |
          flutter build apk \
            --release \
            --obfuscate \
            --split-debug-info=build/debug-info
        working-directory: android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: remoteshield-android
          path: android/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn

  # ───────────────────────────────────────────────────────────────
  # Job 6: Docker Build and Push
  # ───────────────────────────────────────────────────────────────
  docker:
    name: Docker - Build and Push
    needs: backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/remoteshield-backend:latest
            ghcr.io/${{ github.repository_owner }}/remoteshield-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push nginx image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.nginx
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/remoteshield-nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────────────────────────────────────────
  # Job 7: Publish npm Package to GitHub Packages
  # ───────────────────────────────────────────────────────────────
  publish-npm:
    name: Publish - GitHub npm Package
    needs: backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js with GitHub Packages registry
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@manikantbindass'

      - name: Install dependencies
        run: npm install
        working-directory: backend

      - name: Publish package to GitHub Packages
        run: npm publish --access public
        working-directory: backend
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ───────────────────────────────────────────────────────────────
  # Job 8: Security Scan
  # ───────────────────────────────────────────────────────────────
  security-scan:
    name: Security - Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run npm audit (backend)
        run: npm audit --audit-level=critical || true
        working-directory: backend

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        if: always()
        continue-on-error: true
